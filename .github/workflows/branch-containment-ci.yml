name: LeadX Branch Containment CI

on:
  push:
    branches:
      - feat/leadx-cosmic-completion
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: leadx-containment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.ref == 'refs/heads/feat/leadx-cosmic-completion'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact branch commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact isolated revision
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/feat/leadx-cosmic-completion"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test -z "$(git status --porcelain)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install exact dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Baseline compatibility controls
        working-directory: web
        run: npm run test:existing

      - name: Verify baseline coverage matrix
        shell: bash
        run: |
          set -euo pipefail
          test "$(grep -c '^| B[0-9][0-9][0-9] ' docs/test-coverage-matrix.md)" -eq 66
          grep -qx 'BASELINE_COVERAGE=66/66  ' docs/test-coverage-matrix.md
          grep -qx 'BASELINE_UNCOVERED=0  ' docs/test-coverage-matrix.md

      - name: Runtime containment controls
        working-directory: web
        run: node scripts/security-runtime-tests.mjs

      - name: Current-tree and redacted history audit
        working-directory: web
        run: node scripts/repository-scan.mjs || true

      - name: Verify sanitized audit evidence
        shell: bash
        run: |
          set -euo pipefail
          test -s artifacts/security/current-tree-scan.json
          test -s artifacts/security/history-audit-redacted.json
          grep -qx 'HISTORY_VALUES_REDACTED=yes' artifacts/security/scan-summary.txt

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Measure production bundles
        id: bundles
        working-directory: web
        shell: bash
        run: |
          set -euo pipefail
          JS_FILE=$(find dist/assets -maxdepth 1 -type f -name '*.js' | head -n 1)
          CSS_FILE=$(find dist/assets -maxdepth 1 -type f -name '*.css' | head -n 1)
          test -n "$JS_FILE"
          test -n "$CSS_FILE"
          JS_GZIP=$(gzip -c "$JS_FILE" | wc -c | tr -d ' ')
          CSS_GZIP=$(gzip -c "$CSS_FILE" | wc -c | tr -d ' ')
          test "$JS_GZIP" -le 61440
          test "$CSS_GZIP" -le 5120
          echo "js_gzip=$JS_GZIP" >> "$GITHUB_OUTPUT"
          echo "css_gzip=$CSS_GZIP" >> "$GITHUB_OUTPUT"

      - name: Validate endpoint inventory and Worker surface
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/api-inventory.md
          ! grep -R -q 'DASHBOARD_HTML' worker.js worker
          ! grep -R -q 'async scheduled' worker.js worker
          for endpoint in /api/auth/login /api/auth/session /api/auth/activity /api/auth/logout /api/leads /api/metrics /api/ingest /api/health; do
            grep -R -q "$endpoint" worker.js worker
            grep -q "$endpoint" docs/api-inventory.md
          done

      - name: Upload sanitized containment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leadx-containment-${{ github.sha }}
          path: artifacts/security
          if-no-files-found: warn
          retention-days: 14

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo '### LeadX branch containment validation'
            echo
            echo "- Branch: ${GITHUB_REF_NAME}"
            echo "- SHA: ${GITHUB_SHA}"
            echo "- Exact checkout verified: yes"
            echo "- Baseline coverage: 66/66"
            echo "- Production operations: disabled"
            echo "- Remote KV / ingest / cron / deployment: not executed"
            echo "- Evidence: sanitized artifact only"
            echo "- JS gzip: ${{ steps.bundles.outputs.js_gzip || 'INDETERMINADO' }} bytes"
            echo "- CSS gzip: ${{ steps.bundles.outputs.css_gzip || 'INDETERMINADO' }} bytes"
          } >> "$GITHUB_STEP_SUMMARY"
