name: LeadX Branch Containment CI

on:
  push:
    branches:
      - feat/leadx-cosmic-completion
      - feat/leadx-multi-linea-comercial-v1
      - feat/leadx-commercial-potential-layout-v1
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: leadx-containment-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/feat/leadx-cosmic-completion' || github.ref == 'refs/heads/feat/leadx-multi-linea-comercial-v1' || github.ref == 'refs/heads/feat/leadx-commercial-potential-layout-v1')) ||
      (github.event_name == 'pull_request' && (github.head_ref == 'feat/leadx-multi-linea-comercial-v1' || github.head_ref == 'feat/leadx-commercial-potential-layout-v1')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout exact candidate SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_SHA }}
          fetch-depth: 0

      - name: Verify exact clean revision
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          test -z "$(git status --porcelain)"
          git merge-base --is-ancestor e762c64ac1e9a71052f70b8e44ca1442d151d8e2 HEAD

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install exact dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../artifacts/diagnostics
          npm run build 2>&1 | tee ../artifacts/diagnostics/build.log

      - name: Preserve all 66 baseline controls
        working-directory: web
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../artifacts/diagnostics
          npm run test:existing 2>&1 | tee ../artifacts/diagnostics/baseline.log

      - name: Verify baseline coverage matrix
        shell: bash
        run: |
          set -euo pipefail
          test "$(grep -c '^| B[0-9][0-9][0-9] ' docs/test-coverage-matrix.md)" -eq 66
          grep -qx 'BASELINE_COVERAGE=66/66  ' docs/test-coverage-matrix.md
          grep -qx 'BASELINE_UNCOVERED=0  ' docs/test-coverage-matrix.md
          jq -e '.total == 66 and .passed == 66 and .failed == 0' web/test-results.json >/dev/null

      - name: Runtime multi-line and contact controls
        working-directory: web
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../artifacts/diagnostics
          npm test 2>&1 | tee ../artifacts/diagnostics/tests.log

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Current-tree and redacted history audit
        working-directory: web
        run: node scripts/repository-scan.mjs || true

      - name: Verify sanitized audit evidence
        shell: bash
        run: |
          set -euo pipefail
          test -s artifacts/security/current-tree-scan.json
          test -s artifacts/security/history-audit-redacted.json
          test -s artifacts/security/scan-summary.txt
          grep -qx 'HISTORY_VALUES_REDACTED=yes' artifacts/security/scan-summary.txt

      - name: Browser screenshots responsive and synthetic session smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ui artifacts/diagnostics
          cd web
          npm install --no-save --package-lock=false @playwright/test@1.51.1
          npx playwright install --with-deps chromium
          npm run preview -- --host 127.0.0.1 > /tmp/leadx-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill "$PREVIEW_PID" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:4173/ >/dev/null
          npx playwright test scripts/visual-smoke.spec.mjs scripts/session-browser-smoke.spec.mjs --workers=1 2>&1 | tee ../artifacts/diagnostics/browser.log
          test "$(find ../artifacts/ui -maxdepth 1 -type f -name '*.png' | wc -l)" -eq 10
          grep -q '10 passed' ../artifacts/diagnostics/browser.log

      - name: Measure production bundles
        id: bundles
        working-directory: web
        shell: bash
        run: |
          set -euo pipefail
          JS_FILE=$(find dist/assets -maxdepth 1 -type f -name '*.js' | head -n 1)
          CSS_FILE=$(find dist/assets -maxdepth 1 -type f -name '*.css' | head -n 1)
          test -n "$JS_FILE" && test -n "$CSS_FILE"
          JS_GZIP=$(gzip -c "$JS_FILE" | wc -c | tr -d ' ')
          CSS_GZIP=$(gzip -c "$CSS_FILE" | wc -c | tr -d ' ')
          test "$JS_GZIP" -le 81920
          test "$CSS_GZIP" -le 12288
          echo "js_gzip=$JS_GZIP" >> "$GITHUB_OUTPUT"
          echo "css_gzip=$CSS_GZIP" >> "$GITHUB_OUTPUT"

      - name: Validate endpoint and deployment surfaces
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/api-inventory.md
          ! grep -R -q 'DASHBOARD_HTML' worker.js worker
          ! grep -R -q 'async scheduled' worker.js worker
          for endpoint in /api/auth/login /api/auth/session /api/auth/activity /api/auth/logout /api/leads /api/metrics /api/ingest /api/health; do
            grep -R -q "$endpoint" worker.js worker
            grep -q "$endpoint" docs/api-inventory.md
          done
          grep -q 'workflow_dispatch:' .github/workflows/deploy-containment.yml
          grep -q 'target_sha:' .github/workflows/deploy-containment.yml
          grep -q '\[deploy-leadx-once\]' .github/workflows/deploy-once.yml
          ! grep -q 'TARGET_SHA: a6185a2d1fc392d22686ac7dda90ba3afebd7714' .github/workflows/deploy-containment.yml

      - name: Build sanitized artifact manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/meta
          printf 'HEAD_SHA=%s\n' "$EXPECTED_SHA" > artifacts/meta/manifest.txt
          printf 'BASELINE_COVERAGE=66/66\n' >> artifacts/meta/manifest.txt
          printf 'MULTI_LINE_TESTS=PASS\nCONTACT_STATE_TESTS=PASS\n' >> artifacts/meta/manifest.txt
          printf 'SYNTHETIC_SESSION_TESTS=2/2\nPAGEERROR=0\nOVERFLOW=0\nSCREENSHOTS=10\n' >> artifacts/meta/manifest.txt
          printf 'PRIVATE_BROWSER_STORAGE=NOT_USED\nMANUAL_CONTACT_ACTION=DISABLED\n' >> artifacts/meta/manifest.txt
          find artifacts -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > artifacts/SHA256SUMS
          ! find artifacts -type f \( -name '.env' -o -name '*.env' -o -name '*.pem' -o -name '*.key' \) | grep -q .
          ! grep -R -E -i 'set-cookie:|authorization: bearer|CLOUDFLARE_API_TOKEN|DASHBOARD_PASSWORD=|SESSION_SECRET=|INGEST_SECRET=' artifacts

      - name: Upload sanitized containment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leadx-commercial-layout-${{ env.EXPECTED_SHA }}
          path: |
            artifacts/diagnostics
            artifacts/security
            artifacts/ui
            artifacts/meta
            artifacts/SHA256SUMS
            web/dist
            web/test-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo '### LeadX commercial layout validation'
            echo
            echo "- SHA: $EXPECTED_SHA"
            echo '- Exact checkout: verified'
            echo '- Baseline: 66/66'
            echo '- Contact status: server-derived only'
            echo '- Manual contact mutation: disabled'
            echo '- Browser states: 10'
            echo '- Synthetic login/reload/logout: 2/2'
            echo '- Production operations: disabled'
            echo "- JS gzip: ${{ steps.bundles.outputs.js_gzip || 'INDETERMINADO' }} bytes"
            echo "- CSS gzip: ${{ steps.bundles.outputs.css_gzip || 'INDETERMINADO' }} bytes"
          } >> "$GITHUB_STEP_SUMMARY"
