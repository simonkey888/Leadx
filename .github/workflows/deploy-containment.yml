name: LeadX Legacy Containment Deploy Guard

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  blocked:
    runs-on: ubuntu-latest
    steps:
      - name: Legacy GitHub deploy path is disabled
        shell: bash
        run: |
          echo "::error::Do not deploy production from GitHub. Use scripts/deploy-workers-first.sh, then reconcile the exact deployed source in GitHub and run LeadX Workers-first Reconciliation."
          exit 1
