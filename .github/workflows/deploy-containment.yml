name: Deploy containment

# Manual dispatch only — no auto-trigger on push or schedule.
# Executes: checkout → build → 66 tests → validate creds → validate secrets
# → register active version → dry-run → deploy → smoke tests → auto-rollback on failure.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TARGET_SHA: a6185a2d1fc392d22686ac7dda90ba3afebd7714

    steps:
      - name: Checkout approved product SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1

      - name: Verify HEAD is exactly the approved SHA
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          if [[ "$actual" != "$TARGET_SHA" ]]; then
            echo "HEAD mismatch: expected=$TARGET_SHA actual=$actual"
            exit 1
          fi
          echo "✓ HEAD verified: $actual"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Run all 66 tests
        working-directory: web
        run: npm test

      - name: Verify Cloudflare authentication
        run: npx --yes wrangler@4.111.0 whoami

      - name: Verify required Worker secrets by name
        shell: bash
        run: |
          set -euo pipefail
          secret_names="$(npx --yes wrangler@4.111.0 secret list --format json | jq -r '.[].name')"
          for required in DASHBOARD_PASSWORD SESSION_SECRET INGEST_SECRET; do
            if ! grep -Fxq "$required" <<<"$secret_names"; then
              echo "Missing required Worker secret: $required"
              exit 1
            fi
          done
          echo "✓ All required Worker secret names are configured."

      - name: Register active deployment version (before change)
        id: prev_version
        shell: bash
        run: |
          set -euo pipefail
          PREV_VERSION="$(npx --yes wrangler@4.111.0 deployments list --format json | jq -r '[.[] | select(.is_active==true)] | .[0].id // empty')"
          echo "Previous active version: ${PREV_VERSION:-none}"
          echo "prev_version=${PREV_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate deployment bundle (dry-run)
        run: npx --yes wrangler@4.111.0 deploy --dry-run

      - name: Execute deployment
        id: deploy
        run: |
          set -euo pipefail
          DEPLOY_OUTPUT="$(npx --yes wrangler@4.111.0 deploy 2>&1)"
          echo "$DEPLOY_OUTPUT"
          VERSION_ID="$(echo "$DEPLOY_OUTPUT" | grep -oE 'Current Version ID: [a-f0-9-]+' | awk '{print $4}')"
          echo "Deployed version: ${VERSION_ID:-unknown}"
          echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"

      - name: Smoke tests — verify production
        id: smoke
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://leadx.simondalmasso44.workers.dev"
          FAIL=0

          echo "── /api/auth/session (expect mode=demo, authenticated=false) ──"
          RESP="$(curl -s "$BASE/api/auth/session")"
          echo "$RESP"
          echo "$RESP" | jq -e '.authenticated == false and .mode == "demo"' >/dev/null || FAIL=1

          echo "── /api/leads (expect exactly 12 demo leads) ──"
          RESP="$(curl -s "$BASE/api/leads?limit=200")"
          COUNT="$(echo "$RESP" | jq '.leads_all | length')"
          echo "leads count: $COUNT"
          [[ "$COUNT" -eq 12 ]] || FAIL=1
          echo "$RESP" | jq -e '[.leads_all[] | select(._isDemo == true)] | length == 12' >/dev/null || FAIL=1

          echo "── /api/metrics (expect status=demo, no real counters) ──"
          RESP="$(curl -s "$BASE/api/metrics")"
          echo "$RESP"
          echo "$RESP" | jq -e '.status == "demo"' >/dev/null || FAIL=1
          echo "$RESP" | jq -e 'has("last_updated") | not' >/dev/null || FAIL=1
          echo "$RESP" | jq -e 'has("version") | not' >/dev/null || FAIL=1

          echo "── GET / (expect React light, title=LeadX CRM) ──"
          HTML="$(curl -s "$BASE/")"
          echo "$HTML" | grep -q '<title>LeadX CRM</title>' || FAIL=1
          echo "$HTML" | grep -q '#000000' && FAIL=1 || true

          echo "── No real data anonymous (check no real lead names) ──"
          for name in Benitez Cadiboni Lotito Suarez; do
            echo "$RESP" | grep -q "$name" && FAIL=1 || true
          done

          if [[ "$FAIL" -ne 0 ]]; then
            echo "SMOKE_FAILED=1"
            exit 1
          fi
          echo "✓ All smoke tests passed"

      - name: Automatic rollback on smoke failure
        if: failure() && steps.smoke.conclusion == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          PREV="${{ steps.prev_version.outputs.prev_version }}"
          if [[ -z "$PREV" || "$PREV" == "none" ]]; then
            echo "No previous version to rollback to. Manual intervention required."
            exit 1
          fi
          echo "Rolling back to version: $PREV"
          npx --yes wrangler@4.111.0 rollback "$PREV" --message "Auto-rollback: smoke tests failed after deploy of ${{ steps.deploy.outputs.version_id }}"
          echo "✓ Rollback complete"

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "### Deploy Containment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target SHA: ${{ env.TARGET_SHA }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Previous version: ${{ steps.prev_version.outputs.prev_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployed version: ${{ steps.deploy.outputs.version_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Smoke tests: ${{ steps.smoke.conclusion }}" >> "$GITHUB_STEP_SUMMARY"
