name: LeadX Post-Import Production Verification

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/post-import-production-verify.yml

permissions:
  contents: read

concurrency:
  group: leadx-post-import-production-verification
  cancel-in-progress: true

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'ops/leadx-post-import-verify-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      BASE_URL: https://leadx.simondalmasso44.workers.dev
      DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
      EXPECTED_AGRO_ID_SHA256: 8670c8c7f4d859690b07965b0938748c79b2a02a59ad437b4c16851b12f0ac65
    steps:
      - name: Preflight
        shell: bash
        run: |
          set -euo pipefail
          test -n "$DASHBOARD_PASSWORD"
          mkdir -p artifacts/post-import
          printf '%s\n' \
            'MAIN_SHA_UNDER_VERIFICATION=66fb08e745e3a12a4458d01991fc3501cdb32da1' \
            'EXPECTED_FOTOMULTAS_COUNT=9' \
            'EXPECTED_REPUESTOS_AGRICOLAS_COUNT=40' \
            "EXPECTED_AGRO_ID_SET_SHA256=$EXPECTED_AGRO_ID_SHA256" \
            > artifacts/post-import/summary.txt

      - name: Authenticated production readback
        shell: bash
        run: |
          set -u -o pipefail
          summary=artifacts/post-import/summary.txt
          nonce="post-import-${{ github.event.pull_request.head.sha }}-$(date +%s%N)"
          cleanup() { rm -f /tmp/health.json /tmp/login.json /tmp/session.json /tmp/fotomultas.json /tmp/repuestos_agricolas.json /tmp/logout.json /tmp/session-ended.json /tmp/leadx.cookies; }
          fail() { echo "FAIL_GATE=$1" | tee -a "$summary"; cleanup; exit 1; }
          pass() { echo "$1=PASS" | tee -a "$summary"; }

          health_code="$(curl -sS -o /tmp/health.json -w '%{http_code}' "$BASE_URL/api/health?verify=$nonce")" || fail HEALTH_REQUEST
          echo "HEALTH_HTTP=$health_code" >> "$summary"
          test "$health_code" = 200 || fail HEALTH_HTTP
          jq -e '.status=="ok" and .service=="leadx" and (.version|type)=="string"' /tmp/health.json >/dev/null || fail HEALTH_CONTRACT
          pass HEALTH

          login_code="$(curl -sS -c /tmp/leadx.cookies -o /tmp/login.json -w '%{http_code}' \
            -H 'Content-Type: application/json' \
            --data-binary "$(jq -cn --arg password "$DASHBOARD_PASSWORD" '{password:$password}')" \
            "$BASE_URL/api/auth/login?verify=$nonce")" || fail LOGIN_REQUEST
          echo "LOGIN_HTTP=$login_code" >> "$summary"
          test "$login_code" = 200 || fail LOGIN_HTTP
          jq -e '.ok==true' /tmp/login.json >/dev/null || fail LOGIN_CONTRACT
          pass LOGIN

          session_code="$(curl -sS -b /tmp/leadx.cookies -o /tmp/session.json -w '%{http_code}' "$BASE_URL/api/auth/session?verify=$nonce")" || fail SESSION_REQUEST
          echo "SESSION_HTTP=$session_code" >> "$summary"
          test "$session_code" = 200 || fail SESSION_HTTP
          jq -e '.authenticated==true and .mode=="real"' /tmp/session.json >/dev/null || fail SESSION_REAL
          pass SESSION_REAL

          for vertical in fotomultas repuestos_agricolas; do
            code="$(curl -sS -b /tmp/leadx.cookies -o "/tmp/${vertical}.json" -w '%{http_code}' "$BASE_URL/api/leads?vertical=$vertical&verify=$nonce")" || fail "${vertical^^}_REQUEST"
            echo "${vertical^^}_HTTP=$code" >> "$summary"
            test "$code" = 200 || fail "${vertical^^}_HTTP"
            jq -e '(.leads_all|type)=="array" and (.meta.source != "demo")' "/tmp/${vertical}.json" >/dev/null || fail "${vertical^^}_REAL_PAYLOAD"
            mismatches="$(jq --arg vertical "$vertical" '[.leads_all[] | select(.vertical != $vertical)] | length' "/tmp/${vertical}.json")" || fail "${vertical^^}_VERTICAL_PARSE"
            echo "${vertical^^}_VERTICAL_MISMATCHES=$mismatches" >> "$summary"
            test "$mismatches" = 0 || fail "${vertical^^}_VERTICAL_CONTAINMENT"
          done
          pass VERTICAL_CONTAINMENT

          fotomultas_count="$(jq '.leads_all|length' /tmp/fotomultas.json)" || fail FOTOMULTAS_COUNT_PARSE
          agro_count="$(jq '.leads_all|length' /tmp/repuestos_agricolas.json)" || fail AGRO_COUNT_PARSE
          foto_unique="$(jq '[.leads_all[].id]|unique|length' /tmp/fotomultas.json)" || fail FOTOMULTAS_IDS_PARSE
          agro_unique="$(jq '[.leads_all[].id]|unique|length' /tmp/repuestos_agricolas.json)" || fail AGRO_IDS_PARSE
          agro_hash="$(jq -r '.leads_all[].id' /tmp/repuestos_agricolas.json | LC_ALL=C sort | sha256sum | awk '{print $1}')" || fail AGRO_HASH
          ex_count="$(jq '[.leads_all[].id | select(startswith("agro_ex_"))] | length' /tmp/repuestos_agricolas.json)" || fail AGRO_EX_COUNT_PARSE
          doc_count="$(jq '[.leads_all[].id | select(startswith("agro_doc_"))] | length' /tmp/repuestos_agricolas.json)" || fail AGRO_DOC_COUNT_PARSE
          new_count="$(jq '[.leads_all[].id | select(startswith("agro_new_"))] | length' /tmp/repuestos_agricolas.json)" || fail AGRO_NEW_COUNT_PARSE
          overlap="$(jq -n --slurpfile a /tmp/fotomultas.json --slurpfile b /tmp/repuestos_agricolas.json '[$a[0].leads_all[].id] as $x | [$b[0].leads_all[].id] as $y | [$x[] | select(. as $id | $y | index($id))] | length')" || fail CROSS_VERTICAL_PARSE

          printf '%s\n' \
            "FOTOMULTAS_COUNT=$fotomultas_count" \
            "FOTOMULTAS_UNIQUE_IDS=$foto_unique" \
            "REPUESTOS_AGRICOLAS_COUNT=$agro_count" \
            "REPUESTOS_AGRICOLAS_UNIQUE_IDS=$agro_unique" \
            "ACTUAL_AGRO_ID_SET_SHA256=$agro_hash" \
            "AGRO_EX_COUNT=$ex_count" \
            "AGRO_DOC_COUNT=$doc_count" \
            "AGRO_NEW_COUNT=$new_count" \
            "CROSS_VERTICAL_ID_OVERLAP=$overlap" \
            >> "$summary"

          test "$fotomultas_count" = 9 || fail FOTOMULTAS_COUNT
          test "$foto_unique" = 9 || fail FOTOMULTAS_IDS_UNIQUE
          test "$agro_count" = 40 || fail REPUESTOS_AGRICOLAS_COUNT
          test "$agro_unique" = 40 || fail AGRO_IDS_UNIQUE
          test "$agro_hash" = "$EXPECTED_AGRO_ID_SHA256" || fail AGRO_EXPECTED_ID_SET
          test "$ex_count" = 11 || fail AGRO_EX_COUNT
          test "$doc_count" = 12 || fail AGRO_DOC_COUNT
          test "$new_count" = 17 || fail AGRO_NEW_COUNT
          test "$overlap" = 0 || fail CROSS_VERTICAL_ID_OVERLAP
          pass DATA_INVARIANTS

          logout_code="$(curl -sS -b /tmp/leadx.cookies -c /tmp/leadx.cookies -o /tmp/logout.json -w '%{http_code}' -X POST "$BASE_URL/api/auth/logout?verify=$nonce")" || fail LOGOUT_REQUEST
          echo "LOGOUT_HTTP=$logout_code" >> "$summary"
          test "$logout_code" = 200 || fail LOGOUT_HTTP
          ended_code="$(curl -sS -b /tmp/leadx.cookies -o /tmp/session-ended.json -w '%{http_code}' "$BASE_URL/api/auth/session?verify=$nonce")" || fail SESSION_ENDED_REQUEST
          echo "SESSION_ENDED_HTTP=$ended_code" >> "$summary"
          test "$ended_code" = 200 || fail SESSION_ENDED_HTTP
          jq -e '.authenticated==false and .mode=="demo"' /tmp/session-ended.json >/dev/null || fail LOGOUT_DEMO
          pass LOGOUT_DEMO
          cleanup

      - name: Browser desktop and mobile
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save --package-lock=false @playwright/test@1.51.1 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
          cat > post-import.spec.mjs <<'EOF'
          import { test, expect } from '@playwright/test';
          const base = process.env.BASE_URL;
          const password = process.env.DASHBOARD_PASSWORD;
          for (const [name,width,height] of [['desktop',1440,900],['mobile',390,844]]) {
            test(name, async ({page}) => {
              const pageErrors=[]; const failed=[];
              page.on('pageerror',error=>pageErrors.push(error.message));
              page.on('requestfailed',request=>failed.push(`${request.method()} ${request.url()} ${request.failure()?.errorText||''}`));
              await page.setViewportSize({width,height});
              await page.goto(`${base}/?linea=repuestos_agricolas&verify=${Date.now()}`,{waitUntil:'networkidle'});
              await expect(page.getByText('Modo demo',{exact:true})).toBeVisible();
              await expect(page.getByRole('button',{name:'Importar leads'})).toHaveCount(0);
              if (width < 760) await page.getByRole('button',{name:'Desbloquear datos reales'}).click();
              await page.getByLabel('Contraseña').last().fill(password);
              await page.getByRole('button',{name:width<760?'Ingresar':'Entrar'}).click();
              await expect(page.getByText('Datos reales',{exact:true})).toBeVisible();
              await expect(page.getByRole('button',{name:'Importar leads'})).toBeVisible();
              await expect(page.locator(width<760?'.mobile-cards:visible .lead-card':'.lead-table:visible tbody tr')).toHaveCount(40);
              await page.reload({waitUntil:'networkidle'});
              await expect(page.getByText('Datos reales',{exact:true})).toBeVisible();
              await expect(page.locator(width<760?'.mobile-cards:visible .lead-card':'.lead-table:visible tbody tr')).toHaveCount(40);
              await page.getByRole('button',{name:'Fotomultas'}).click();
              await expect(page.locator(width<760?'.mobile-cards:visible .lead-card':'.lead-table:visible tbody tr')).toHaveCount(9);
              const realDiag=await page.evaluate(()=>({overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth,stored:localStorage.length+sessionStorage.length}));
              expect(realDiag).toEqual({overflow:0,stored:0});
              expect(pageErrors).toEqual([]); expect(failed).toEqual([]);
              await page.getByRole('button',{name:'Salir'}).click();
              await expect(page.getByText('Modo demo',{exact:true})).toBeVisible();
              await expect(page.getByRole('button',{name:'Importar leads'})).toHaveCount(0);
              const ended=await page.request.get(`${base}/api/auth/session?verify=${Date.now()}`);
              expect(await ended.json()).toMatchObject({authenticated:false,mode:'demo'});
              const demoDiag=await page.evaluate(()=>({overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth,stored:localStorage.length+sessionStorage.length}));
              expect(demoDiag).toEqual({overflow:0,stored:0});
              expect(pageErrors).toEqual([]); expect(failed).toEqual([]);
              await page.screenshot({path:`artifacts/post-import/${name}-demo-after-logout.png`,fullPage:true});
            });
          }
          EOF
          npx playwright test post-import.spec.mjs --workers=1
          rm -f post-import.spec.mjs
          test "$(find artifacts/post-import -name '*-demo-after-logout.png' | wc -l)" -eq 2
          printf '%s\n' \
            'BROWSER_DESKTOP_REAL=PASS' \
            'BROWSER_MOBILE_REAL=PASS' \
            'RELOAD_SESSION=PASS' \
            'PAGEERROR=0' \
            'FAILED_REQUESTS=0' \
            'HORIZONTAL_OVERFLOW=0' \
            'CLIENT_STORAGE=0' \
            'PRIVATE_IMPORT_VISIBILITY=PASS' \
            >> artifacts/post-import/summary.txt

      - name: Redact and hash evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f post-import.spec.mjs /tmp/leadx.cookies /tmp/*.json
          find artifacts/post-import -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 -r sha256sum > artifacts/post-import/SHA256SUMS
          ! grep -R -E -i 'DASHBOARD_PASSWORD|SESSION_SECRET|INGEST_SECRET|CLOUDFLARE_API_TOKEN|set-cookie:|whatsapp_publico|email_publico|contact_name|agro_(ex|doc|new)_[0-9]' artifacts/post-import

      - name: Upload redacted evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leadx-post-import-${{ github.event.pull_request.head.sha }}
          path: artifacts/post-import
          if-no-files-found: error
          retention-days: 7
