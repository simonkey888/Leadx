name: Radar Leads — Cron Pipeline

on:
  schedule:
    # Cada 3 horas UTC
    - cron: '0 */3 * * *'
  workflow_dispatch: # Permite ejecutar manualmente

permissions:
  contents: write # Para commitear los JSONs actualizados

jobs:
  run-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install z-ai CLI
        run: |
          npm install -g z-ai-web-dev-sdk
          echo "z-ai installed: $(which z-ai)"

      - name: Configure z-ai credentials
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        run: |
          mkdir -p ~/.config/z-ai
          echo "{\"apiKey\":\"$ZAI_API_KEY\"}" > ~/.config/z-ai/config.json

      - name: Run pipeline
        run: |
          # El pipeline escribe a /home/z/my-project/download/data/ por defecto
          # pero en GitHub Actions no existe ese path. Lo parcheamos para que
          # escriba a ./data/ relativo al repo.
          sed -i 's|/home/z/my-project/download/data|./data|g' generate_payload.py
          python generate_payload.py

      - name: Copy to public/data (for Cloudflare assets)
        run: |
          mkdir -p public/data
          cp data/dashboard_payload.json public/data/dashboard_payload.json
          cp data/stats.json public/data/stats.json
          cp data/history.json public/data/history.json

      - name: Commit and push artifacts
        run: |
          git config user.name "Radar Bot"
          git config user.email "radar-bot@users.noreply.github.com"
          
          git add data/dashboard_payload.json data/stats.json data/history.json
          git add public/data/dashboard_payload.json public/data/stats.json public/data/history.json
          
          git diff --staged --quiet || git commit -m "radar: auto-update payloads $(date -u '+%Y-%m-%d %H:%M UTC')"
          
          git push

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy

      - name: Summary
        if: always()
        run: |
          echo "### Radar Pipeline Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/dashboard_payload.json ]; then
            echo "✅ Payload generated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            python -c "import json; d=json.load(open('data/dashboard_payload.json')); print(json.dumps(d['summary'], indent=2))" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Payload not generated" >> $GITHUB_STEP_SUMMARY
          fi
