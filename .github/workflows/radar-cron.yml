name: Radar Leads — Cron Pipeline

# SECURITY FREEZE 2026-07-14: schedule removido + wrangler deploy eliminado.
# Solo ejecutable manualmente via workflow_dispatch.
# Restablecer cron + deploy solo despues de revision de seguridad completa.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pipeline
        env:
          WORKER_URL: https://leadx.simondalmasso44.workers.dev
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          python generate_payload.py

      - name: Copy to public/data
        run: |
          mkdir -p public/data
          cp data/dashboard_payload.json public/data/dashboard_payload.json 2>/dev/null || true
          cp data/stats.json public/data/stats.json 2>/dev/null || true
          cp data/history.json public/data/history.json 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "Radar Bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add data/ public/data/
          git diff --staged --quiet || git commit -m "radar: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upsert Fotomultas leads to Worker KV via /api/ingest
        env:
          WORKER_URL: https://leadx.simondalmasso44.workers.dev
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f data/dashboard_payload.json ]; then
            echo "No payload file found, skipping ingest"
            exit 0
          fi

          SAFE_PAYLOAD="$(mktemp)"
          trap 'rm -f "$SAFE_PAYLOAD"' EXIT
          jq -e '
            (.leads_all | type == "array")
            and ((.leads_all | length) <= 500)
          ' data/dashboard_payload.json >/dev/null
          jq '
            . + {mode:"upsert_vertical", vertical:"fotomultas"}
            | .leads_all = [(.leads_all // [])[] | . + {vertical:"fotomultas"}]
          ' data/dashboard_payload.json > "$SAFE_PAYLOAD"

          LEADS_COUNT="$(jq '.leads_all | length' "$SAFE_PAYLOAD")"
          echo "Upserting $LEADS_COUNT Fotomultas leads to Worker..."
          RESPONSE="$(curl -sS -w "\n%{http_code}" -X POST "$WORKER_URL/api/ingest" \
            -H "X-Webhook-Secret: $INGEST_SECRET" \
            -H "Content-Type: application/json" \
            --data-binary @"$SAFE_PAYLOAD")"
          HTTP_CODE="$(echo "$RESPONSE" | tail -1)"
          BODY="$(echo "$RESPONSE" | head -n -1)"
          echo "HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: Ingest failed"
            exit 1
          fi
          jq -e --argjson expected "$LEADS_COUNT" '
            .status == "ok"
            and .mode == "upsert_vertical"
            and .vertical == "fotomultas"
            and .imported == $expected
            and (.inserted + .updated == .imported)
          ' <<<"$BODY" >/dev/null

      # SECURITY: "Deploy Worker to Cloudflare" step eliminado.
      # Worker deployments now require explicit manual `npx wrangler deploy`
      # from a trusted machine after security review.

      - name: Summary
        if: always()
        run: |
          echo "### Radar Pipeline (manual only — security freeze)" >> $GITHUB_STEP_SUMMARY
          if [ -f data/dashboard_payload.json ]; then
            python3 -c "import json; d=json.load(open('data/dashboard_payload.json')); print(f'Leads: {d[\"summary\"][\"total_leads\"]} | Hot: {d[\"summary\"][\"hot_leads\"]}')" >> $GITHUB_STEP_SUMMARY
          fi
