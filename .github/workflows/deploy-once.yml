name: LeadX Production Deploy Once

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: leadx-production
  cancel-in-progress: false

jobs:
  deploy:
    if: contains(github.event.head_commit.message, '[deploy-leadx-once]')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      LEADX_SMOKE_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
      TARGET_SHA: ${{ github.sha }}
      BASE_URL: https://leadx.simondalmasso44.workers.dev
      WORKER_NAME: leadx
      WRANGLER_VERSION: 4.111.0

    steps:
      - name: Checkout exact main SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify exact current main HEAD
        shell: bash
        run: |
          set -euo pipefail
          [[ "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$TARGET_SHA"
          test -z "$(git status --porcelain)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install exact dependencies
        working-directory: web
        run: npm ci

      - name: Build test and typecheck exact target
        working-directory: web
        run: |
          set -euo pipefail
          npm run build
          npm test
          npm run typecheck

      - name: Preflight Cloudflare access and secret names
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN" || { echo 'Missing GitHub Actions secret: CLOUDFLARE_API_TOKEN'; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo 'Missing GitHub Actions secret: CLOUDFLARE_ACCOUNT_ID'; exit 1; }
          test -n "$LEADX_SMOKE_PASSWORD" || { echo 'Missing GitHub Actions secret: DASHBOARD_PASSWORD'; exit 1; }
          npx --yes wrangler@${WRANGLER_VERSION} whoami >/dev/null
          names="$(npx --yes wrangler@${WRANGLER_VERSION} secret list --format json | jq -r '.[].name')"
          for name in DASHBOARD_PASSWORD SESSION_SECRET INGEST_SECRET; do
            grep -Fxq "$name" <<<"$names" || { echo "Missing Cloudflare Worker secret: $name"; exit 1; }
          done

      - name: Record previous production deployment
        id: previous
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/deploy artifacts/production
          deployments_jq='
            def deployments:
              if (.result | type) == "array" then
                .result
              elif (.result | type) == "object"
                   and (.result.deployments | type) == "array" then
                .result.deployments
              else
                error("Unexpected Cloudflare deployments response schema")
              end;
          '
          endpoint="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/deployments"
          curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$endpoint" > artifacts/deploy/previous-deployments.json
          jq -e "${deployments_jq} .success == true and (deployments | length) > 0" artifacts/deploy/previous-deployments.json >/dev/null
          previous_deployment="$(jq -r "${deployments_jq} deployments[0].id // empty" artifacts/deploy/previous-deployments.json)"
          previous_version="$(jq -r "${deployments_jq} deployments[0].versions[]? | select(.percentage == 100) | .version_id" artifacts/deploy/previous-deployments.json | head -n 1)"
          test -n "$previous_deployment" && test -n "$previous_version"
          echo "deployment_id=$previous_deployment" >> "$GITHUB_OUTPUT"
          echo "version_id=$previous_version" >> "$GITHUB_OUTPUT"

      - name: Validate deployment bundle dry-run
        shell: bash
        run: npx --yes wrangler@${WRANGLER_VERSION} deploy --dry-run

      - name: Deploy exactly once
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          output="$(npx --yes wrangler@${WRANGLER_VERSION} deploy 2>&1)"
          printf '%s\n' "$output"
          version_id="$(grep -oE 'Current Version ID: [a-f0-9-]+' <<<"$output" | awk '{print $4}' | tail -n 1)"
          if [[ -z "$version_id" ]]; then
            version_id="$(npx --yes wrangler@${WRANGLER_VERSION} versions list --json | jq -r '.[0].id // .[0].version_id // empty')"
          fi
          test -n "$version_id"
          echo "version_id=$version_id" >> "$GITHUB_OUTPUT"

      - name: Confirm active deployment and execute production smokes
        id: smoke
        shell: bash
        env:
          LEADX_BASE_URL: ${{ env.BASE_URL }}
        run: |
          set -euo pipefail
          deployments_jq='
            def deployments:
              if (.result | type) == "array" then
                .result
              elif (.result | type) == "object"
                   and (.result.deployments | type) == "array" then
                .result.deployments
              else
                error("Unexpected Cloudflare deployments response schema")
              end;
          '
          endpoint="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/deployments"
          for attempt in $(seq 1 30); do
            curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$endpoint" > artifacts/deploy/current-deployments.json
            jq -e "${deployments_jq} .success == true and (deployments | length) > 0" artifacts/deploy/current-deployments.json >/dev/null
            current_version="$(jq -r "${deployments_jq} deployments[0].versions[]? | select(.percentage == 100) | .version_id" artifacts/deploy/current-deployments.json | head -n 1)"
            [[ "$current_version" == "${{ steps.deploy.outputs.version_id }}" ]] && break
            sleep 2
          done
          jq -e --arg version '${{ steps.deploy.outputs.version_id }}' "${deployments_jq} .success == true and (deployments | length) > 0 and (deployments[0].versions | length) == 1 and (deployments[0].versions[0].percentage == 100) and (deployments[0].versions[0].version_id == \$version)" artifacts/deploy/current-deployments.json >/dev/null
          deployment_id="$(jq -r "${deployments_jq} deployments[0].id" artifacts/deploy/current-deployments.json)"
          test -n "$deployment_id"
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"
          echo 'traffic=100' >> "$GITHUB_OUTPUT"

          curl -fsS -D artifacts/production/health.headers "$BASE_URL/api/health" -o artifacts/production/health.json
          jq -e '.status == "ok" and .service == "leadx" and .version == "leadx-multiline-v1"' artifacts/production/health.json >/dev/null
          curl -fsS -D artifacts/production/session.headers "$BASE_URL/api/auth/session" -o artifacts/production/session.json
          jq -e '.authenticated == false and .mode == "demo"' artifacts/production/session.json >/dev/null
          for vertical in fotomultas repuestos_agricolas; do
            curl -fsS -D "artifacts/production/leads-${vertical}.headers" "$BASE_URL/api/leads?vertical=$vertical" -o "artifacts/production/leads-${vertical}.json"
            jq -e --arg vertical "$vertical" '.leads_all | length == 12 and all(.[]; ._isDemo == true and .vertical == $vertical)' "artifacts/production/leads-${vertical}.json" >/dev/null
            ! jq -e '.. | strings | select(test("Benitez|Cadiboni|Lotito|Cepero|Ecovictor|Vlad Gold"; "i"))' "artifacts/production/leads-${vertical}.json" >/dev/null
            grep -qi '^cache-control: no-store' "artifacts/production/leads-${vertical}.headers"
            curl -fsS "$BASE_URL/api/metrics?vertical=$vertical" -o "artifacts/production/metrics-${vertical}.json"
            jq -e '.status == "demo" and .total_leads == 12 and .contactable_leads == 0' "artifacts/production/metrics-${vertical}.json" >/dev/null
          done
          curl -fsS "$BASE_URL/" -o artifacts/production/index.html
          grep -q '<title>LeadX CRM</title>' artifacts/production/index.html

          cd web
          npm install --no-save --package-lock=false @playwright/test@1.51.1
          npx playwright install --with-deps chromium
          npx playwright test scripts/production-smoke.spec.mjs --workers=1
          cd ..
          test "$(find artifacts/production -maxdepth 1 -type f -name '*.png' | wc -l)" -eq 2

          printf 'TARGET_SHA=%s\n' "$TARGET_SHA" > artifacts/deploy/summary.txt
          printf 'PREVIOUS_DEPLOYMENT_ID=%s\n' '${{ steps.previous.outputs.deployment_id }}' >> artifacts/deploy/summary.txt
          printf 'PREVIOUS_VERSION_ID=%s\n' '${{ steps.previous.outputs.version_id }}' >> artifacts/deploy/summary.txt
          printf 'NEW_DEPLOYMENT_ID=%s\n' "$deployment_id" >> artifacts/deploy/summary.txt
          printf 'NEW_VERSION_ID=%s\n' '${{ steps.deploy.outputs.version_id }}' >> artifacts/deploy/summary.txt
          printf 'TRAFFIC_ACTIVE=100%%\nPAGEERROR=0\nOVERFLOW=0\n' >> artifacts/deploy/summary.txt

      - name: Automatic rollback after post-deploy smoke failure
        id: rollback
        if: failure() && steps.deploy.conclusion == 'success' && steps.smoke.conclusion == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          deployments_jq='
            def deployments:
              if (.result | type) == "array" then
                .result
              elif (.result | type) == "object"
                   and (.result.deployments | type) == "array" then
                .result.deployments
              else
                error("Unexpected Cloudflare deployments response schema")
              end;
          '
          npx --yes wrangler@${WRANGLER_VERSION} rollback '${{ steps.previous.outputs.version_id }}' --message "Automatic rollback after failed LeadX smoke for ${TARGET_SHA}"
          endpoint="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/deployments"
          for attempt in $(seq 1 30); do
            curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$endpoint" > artifacts/deploy/rollback-deployments.json
            jq -e "${deployments_jq} .success == true and (deployments | length) > 0" artifacts/deploy/rollback-deployments.json >/dev/null
            restored="$(jq -r "${deployments_jq} deployments[0].versions[]? | select(.percentage == 100) | .version_id" artifacts/deploy/rollback-deployments.json | head -n 1)"
            [[ "$restored" == '${{ steps.previous.outputs.version_id }}' ]] && break
            sleep 2
          done
          jq -e --arg version '${{ steps.previous.outputs.version_id }}' "${deployments_jq} .success == true and (deployments | length) > 0 and (deployments[0].versions | length) == 1 and (deployments[0].versions[0].percentage == 100) and (deployments[0].versions[0].version_id == \$version)" artifacts/deploy/rollback-deployments.json >/dev/null
          curl -fsS "$BASE_URL/api/health" | jq -e '.status == "ok" and .service == "leadx" and (.version | type == "string") and (.version | length > 0)' >/dev/null
          echo 'ROLLBACK_STATE=completed' >> artifacts/deploy/summary.txt

      - name: Build redacted production evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/deploy artifacts/production
          find artifacts -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > artifacts/SHA256SUMS
          rm -f artifacts/production/leads-*.json artifacts/production/index.html
          ! grep -R -E -i 'set-cookie:|authorization: bearer|DASHBOARD_PASSWORD=|SESSION_SECRET=|INGEST_SECRET=|CLOUDFLARE_API_TOKEN' artifacts

      - name: Upload redacted production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leadx-production-${{ env.TARGET_SHA }}
          path: |
            artifacts/deploy
            artifacts/production
            artifacts/SHA256SUMS
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo '### LeadX production deployment'
            echo
            echo "- Target main SHA: $TARGET_SHA"
            echo "- Previous deployment: ${{ steps.previous.outputs.deployment_id || 'INDETERMINADO' }}"
            echo "- Previous version: ${{ steps.previous.outputs.version_id || 'INDETERMINADO' }}"
            echo "- New deployment: ${{ steps.smoke.outputs.deployment_id || 'INDETERMINADO' }}"
            echo "- New version: ${{ steps.deploy.outputs.version_id || 'INDETERMINADO' }}"
            echo "- Traffic: ${{ steps.smoke.outputs.traffic || 'INDETERMINADO' }}%"
            echo "- Smoke: ${{ steps.smoke.conclusion || 'not_run' }}"
            echo "- Rollback: ${{ steps.rollback.conclusion || 'not_required' }}"
          } >> "$GITHUB_STEP_SUMMARY"
