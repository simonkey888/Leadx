name: LeadX Legacy Auto Deploy Guard

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  blocked:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub-originated production deploy is disabled
        shell: bash
        run: |
          echo "::error::Canonical deployment is Workers-first. Run scripts/deploy-workers-first.sh from the exact clean release tree, reconcile GitHub afterward, then run LeadX Workers-first Reconciliation."
          exit 1
