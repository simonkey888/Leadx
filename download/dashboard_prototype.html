<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar Leads PRO — Centro Inteligente de Oportunidades</title>
<style>
/* ============================================================
   RADAR LEADS PRO — Design System
   Salesforce Lightning + Linear + Notion
   ============================================================ */
:root {
  --bg: #0d1117;
  --bg-elev: #161b22;
  --bg-elev-2: #1c2128;
  --border: #30363d;
  --border-soft: #21262d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-faint: #6e7681;
  --accent: #0176d3;
  --accent-hover: #1f8ae5;
  --accent-soft: rgba(1, 118, 211, 0.12);
  --red: #f85149;
  --yellow: #d29922;
  --green: #2ea043;
  --blue: #58a6ff;
  --orange: #e8873b;
  --purple: #a371f7;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-md: 0 3px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
  --header-h: 60px;
  --cmd-h: 160px;
  --analytics-h: 190px;
  --filters-h: 50px;
  --row-h: 44px;
  --drawer-w: 480px;
  --radius: 8px;
  --radius-sm: 5px;
  --transition: 140ms cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

button {
  font-family: inherit;
  font-size: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}
input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: var(--text);
}

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: #444c56; }

/* ============================================================
   LAYOUT
   ============================================================ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ============================================================
   HEADER (sticky, 60px)
   ============================================================ */
.header {
  height: var(--header-h);
  flex: 0 0 var(--header-h);
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
}
.brand { display: flex; flex-direction: column; gap: 1px; }
.brand-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.brand-title::before {
  content: "";
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2.4s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.brand-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.02em;
}
.header-stats {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: nowrap;
  overflow: hidden;
}
.stat-badge {
  display: flex;
  flex-direction: column;
  padding: 4px 10px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-sm);
  min-width: 64px;
}
.stat-badge-label {
  font-size: 9px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}
.stat-badge-value {
  font-size: 13px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.stat-badge-value.accent { color: var(--blue); }
.stat-badge-value.hot { color: var(--red); }
.stat-badge-value.ok { color: var(--green); }
.export-group { display: flex; gap: 6px; margin-left: 8px; }
.btn-export {
  padding: 6px 12px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  transition: var(--transition);
  display: flex; align-items: center; gap: 5px;
}
.btn-export:hover {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent-hover);
}

/* ============================================================
   COMMAND CENTER (~160px)
   ============================================================ */
.command-center {
  flex: 0 0 var(--cmd-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: grid;
  grid-template-columns: repeat(6, 1fr) 1.4fr;
  gap: 12px;
  overflow: hidden;
}
.kpi-card {
  background: var(--bg-elev);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  transition: var(--transition);
}
.kpi-card:hover { border-color: var(--border); transform: translateY(-1px); }
.kpi-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  opacity: 0;
  transition: var(--transition);
}
.kpi-card:hover::before { opacity: 1; }
.kpi-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.kpi-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0.01em;
  display: flex;
  align-items: center;
  gap: 5px;
}
.kpi-value {
  font-size: 26px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  line-height: 1;
}
.kpi-meta {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}
.kpi-meta .delta-up { color: var(--green); font-weight: 600; }
.kpi-meta .delta-down { color: var(--red); font-weight: 600; }
.kpi-spark {
  position: absolute;
  bottom: 6px;
  right: 8px;
  width: 70px;
  height: 24px;
  opacity: 0.7;
}
.kpi-bar {
  height: 4px;
  background: var(--border-soft);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 6px;
}
.kpi-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--blue));
  border-radius: 2px;
  transition: width 400ms ease;
}
.insights-card {
  background: linear-gradient(135deg, var(--bg-elev) 0%, #1a1f3a 100%);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.insights-card::before {
  content: "";
  position: absolute;
  top: -20px; right: -20px;
  width: 80px; height: 80px;
  background: radial-gradient(circle, var(--purple) 0%, transparent 70%);
  opacity: 0.15;
  border-radius: 50%;
}
.insights-head {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 6px;
}
.insights-head .ai-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--purple);
  box-shadow: 0 0 6px var(--purple);
}
.insights-text {
  font-size: 12px;
  line-height: 1.5;
  color: var(--text);
  flex: 1;
}
.insights-text b { color: var(--blue); font-weight: 600; }
.insights-text .tag {
  display: inline-block;
  padding: 1px 6px;
  background: rgba(88, 166, 255, 0.1);
  color: var(--blue);
  border-radius: 3px;
  font-weight: 500;
  font-size: 11px;
}

/* ============================================================
   ANALYTICS ROW (~190px)
   ============================================================ */
.analytics-row {
  flex: 0 0 var(--analytics-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  overflow: hidden;
}
.chart-card {
  background: var(--bg-elev);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.chart-title {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.chart-title .count {
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}
.chart-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
  overflow: hidden;
}
.bar-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  min-height: 0;
  flex: 1;
}
.bar-row-label {
  width: 60px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 11px;
}
.bar-row-track {
  flex: 1;
  height: 12px;
  background: var(--border-soft);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.bar-row-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 300ms ease;
}
.bar-row-value {
  width: 28px;
  text-align: right;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  font-size: 11px;
  font-weight: 500;
}
.hour-chart {
  display: grid;
  grid-template-columns: repeat(24, 1fr);
  gap: 1px;
  align-items: flex-end;
  flex: 1;
}
.hour-bar {
  background: var(--accent);
  border-radius: 1px 1px 0 0;
  min-height: 2px;
  opacity: 0.7;
  transition: opacity 120ms;
}
.hour-bar.peak { background: var(--red); opacity: 1; }
.hour-bar:hover { opacity: 1; }
.hour-labels {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--text-faint);
  margin-top: 4px;
}
.line-chart {
  flex: 1;
  position: relative;
  min-height: 0;
}
.line-chart svg { width: 100%; height: 100%; }

/* ============================================================
   FILTERS BAR (sticky, 50px)
   ============================================================ */
.filters-bar {
  flex: 0 0 var(--filters-h);
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 50;
  overflow-x: auto;
  scrollbar-width: none;
}
.filters-bar::-webkit-scrollbar { display: none; }
.time-filters {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.time-filters button {
  padding: 6px 11px;
  font-size: 12px;
  color: var(--text-muted);
  border-right: 1px solid var(--border);
  transition: var(--transition);
  white-space: nowrap;
}
.time-filters button:last-child { border-right: none; }
.time-filters button:hover { background: var(--bg-elev-2); color: var(--text); }
.time-filters button.active {
  background: var(--accent-soft);
  color: var(--accent-hover);
  font-weight: 600;
}
.chip-filters {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
}
.chip-filters::-webkit-scrollbar { display: none; }
.chip {
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  white-space: nowrap;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 4px;
}
.chip:hover { border-color: var(--text-muted); color: var(--text); }
.chip.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent-hover);
}
.chip .chip-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-faint);
}
.chip.active .chip-dot { background: var(--accent); }

.search-box {
  margin-left: auto;
  display: flex;
  align-items: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 8px;
  height: 32px;
  min-width: 220px;
}
.search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.search-box svg { width: 14px; height: 14px; color: var(--text-muted); flex-shrink: 0; }
.search-box input {
  background: none;
  border: none;
  outline: none;
  padding: 0 6px;
  width: 100%;
  font-size: 12px;
}
.search-box .kbd-hint {
  font-size: 10px;
  color: var(--text-faint);
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: ui-monospace, monospace;
}
.sort-select {
  height: 32px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 8px;
  font-size: 12px;
  color: var(--text);
  outline: none;
  cursor: pointer;
}
.sort-select:focus { border-color: var(--accent); }

/* ============================================================
   TABLE + VIRTUAL SCROLL
   ============================================================ */
.table-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
  min-height: 0;
}
.table-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  display: flex;
  height: 36px;
  align-items: center;
}
.th {
  padding: 0 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-right: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  height: 100%;
}
.th-resizer {
  width: 4px;
  margin-left: auto;
  cursor: col-resize;
  height: 100%;
  background: transparent;
  transition: background 120ms;
  flex-shrink: 0;
}
.th-resizer:hover { background: var(--accent); }
.table-body {
  position: relative;
  height: calc(100% - 36px);
  overflow-y: auto;
  overflow-x: auto;
  will-change: transform;
}
.table-spacer {
  position: relative;
  width: 100%;
}
.lead-row {
  position: absolute;
  left: 0;
  height: var(--row-h);
  display: flex;
  align-items: center;
  background: var(--bg);
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer;
  transition: background 80ms;
  width: 100%;
}
.lead-row:hover { background: var(--bg-elev); }
.lead-row.selected { background: var(--accent-soft); }
.lead-row.selected:hover { background: rgba(1, 118, 211, 0.18); }
.td {
  padding: 0 10px;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-right: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  height: 100%;
  color: var(--text);
}
.td.mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
.td.muted { color: var(--text-muted); }
.td.small { font-size: 12px; }

/* Score cell */
.score-cell { gap: 8px; }
.score-num {
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  width: 26px;
  font-size: 13px;
}
.score-bar {
  flex: 1;
  height: 6px;
  background: var(--border-soft);
  border-radius: 3px;
  overflow: hidden;
  min-width: 30px;
}
.score-bar-fill { height: 100%; border-radius: 3px; }

/* Problem badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
  text-transform: uppercase;
}
.badge-transfer { background: rgba(88,166,255,0.12); color: var(--blue); }
.badge-fine { background: rgba(248,81,73,0.12); color: var(--red); }
.badge-ownership { background: rgba(232,135,59,0.12); color: var(--orange); }
.badge-doc { background: rgba(46,160,67,0.12); color: var(--green); }

/* Urgency */
.urgency-fire {
  font-size: 12px;
  filter: drop-shadow(0 0 4px rgba(248,81,73,0.6));
}

/* Estado chip */
.estado-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 500;
  text-transform: capitalize;
  border: 1px solid var(--border);
}
.estado-chip::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
}
.estado-new { background: rgba(88,166,255,0.08); color: var(--blue); border-color: rgba(88,166,255,0.3); }
.estado-new::before { background: var(--blue); }
.estado-reviewed { background: rgba(139,148,158,0.08); color: var(--text-muted); }
.estado-reviewed::before { background: var(--text-muted); }
.estado-contacted { background: rgba(46,160,67,0.08); color: var(--green); border-color: rgba(46,160,67,0.3); }
.estado-contacted::before { background: var(--green); }
.estado-ignored { background: rgba(248,81,73,0.06); color: var(--red); border-color: rgba(248,81,73,0.2); opacity: 0.7; }
.estado-ignored::before { background: var(--red); }

/* Acciones */
.actions-cell { gap: 4px; }
.action-btn {
  width: 22px;
  height: 22px;
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-elev-2);
  border: 1px solid var(--border-soft);
  color: var(--text-muted);
  transition: var(--transition);
  font-size: 11px;
}
.action-btn:hover { color: var(--text); border-color: var(--accent); background: var(--accent-soft); }
.action-btn svg { width: 12px; height: 12px; }
.action-btn.wa:hover { color: var(--green); border-color: var(--green); background: rgba(46,160,67,0.1); }
.action-btn.review:hover { color: var(--blue); }

/* Empty state */
.empty-state {
  position: absolute;
  inset: 36px 0 0 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  gap: 8px;
  font-size: 13px;
}
.empty-state .empty-icon {
  font-size: 28px;
  opacity: 0.5;
}

/* Shimmer loader */
.shimmer {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  background-size: 200% 100%;
  animation: shimmer 800ms ease-out;
  pointer-events: none;
  z-index: 5;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ============================================================
   DRAWER
   ============================================================ */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms;
  z-index: 200;
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed;
  top: 0; right: 0;
  height: 100vh;
  width: var(--drawer-w);
  max-width: 100vw;
  background: var(--bg-elev);
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  transform: translateX(100%);
  transition: transform 220ms cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 201;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.drawer.open { transform: translateX(0); }
.drawer-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
}
.drawer-header-info { flex: 1; min-width: 0; }
.drawer-score-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 4px;
}
.drawer-score {
  font-size: 32px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  letter-spacing: -0.02em;
}
.drawer-prob {
  font-size: 12px;
  color: var(--text-muted);
}
.drawer-prob b { color: var(--text); font-weight: 600; }
.drawer-title {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
  margin-top: 2px;
}
.drawer-close {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;

/* ============================================================

function $(id) { return document.getElementById(id); }
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}
function scoreColor(s) {
  if (s >= 90) return "#58a6ff";
  if (s >= 70) return "#2ea043";
  if (s >= 40) return "#d29922";
  return "#f85149";
}
function problemBadge(p) {
  const m = {
    TRANSFER_PROBLEM: { cls: "badge-transfer", label: "Transferencia" },
    FINE_DISPUTE: { cls: "badge-fine", label: "Multa" },
    OWNERSHIP_ISSUE: { cls: "badge-ownership", label: "Titularidad" },
    DOCUMENTATION_ISSUE: { cls: "badge-doc", label: "Documentación" }
  };
  const v = m[p] || { cls: "badge-doc", label: p };
  return '<span class="badge ' + v.cls + '">' + v.label + '</span>';
}
function fuenteColor(f) {
  return { Facebook:"#0176d3", Reddit:"#ff4500", X:"#1d9bf0", MercadoLibre:"#ffe600" }[f] || "#8b949e";
}
function fmtDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 3600) return Math.floor(diff/60) + "min";
  if (diff < 86400) return Math.floor(diff/3600) + "h";
  return Math.floor(diff/86400) + "d";
}
function fmtDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString("es-AR", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
}
function debounce(fn, ms) {
  let t;
  return function() {
    clearTimeout(t);
    const args = arguments;
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}
function toast(msg, kind) {
  const c = $("toast-container");
  const t = el("div", "toast " + (kind || "info"), msg);
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = 0; setTimeout(() => t.remove(), 200); }, 2400);
}
function persistState() {
  try {
    const data = {};
    for (const id in STATE.history) data[id] = { history: STATE.history[id] };
    localStorage.setItem(PERSIST_KEY, JSON.stringify(data));
  } catch(e) {}
}
function loadPersisted() {
  try {
    const raw = localStorage.getItem(PERSIST_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    for (const id in data) {
      if (data[id].history) STATE.history[id] = data[id].history;
    }
  } catch(e) {}
}
function leadEstado(lead) {
  const h = STATE.history[lead.id] || [];

}

/* ============================================================
   EXPAND 80 → 10K leads (for virtual scroll demo)
   ============================================================ */
function expandLeads() {
  const base = RAW_LEADS;
  const target = 10000;
  const out = [];
  const now = Date.now();
  for (let i = 0; i < target; i++) {
    const b = base[i % base.length];
    const ageMin = Math.floor((i / target) * 7 * 24 * 60); // spread across 7 days
    const fecha = new Date(now - ageMin * 60 * 1000).toISOString();
    out.push({
      id: b.id + "-" + i,
      score: i < target * 0.3 ? b.score : Math.max(5, Math.min(100, b.score + ((i * 7) % 21) - 10)),
      probability: i < target * 0.3 ? b.score : Math.max(5, Math.min(100, b.score + ((i * 7) % 21) - 10)),
      persona: b.persona,
      problema: b.problema,
      provincia: b.provincia,
      ciudad: b.ciudad,
      vehiculo: b.vehiculo,
      patente: b.patente,
      urgency: b.urgency,
      fecha: fecha,
      fuente: b.fuente,
      phone: b.phone,
      whatsapp: b.whatsapp,
      snippet: b.snippet,
      signals: b.signals,
      score_breakdown: b.score_breakdown,
      source_url: sourceUrl(b.fuente, b.id),
      reasoning: ""
    });
  }
  // recompute probability (single pass, no separate loop)
  // reasoning is generated lazily on drawer open to keep boot fast
  return out;
}

function sourceUrl(fuente, id) {
  const slug = id.replace("lead-","").padStart(4,"0");
  if (fuente === "Facebook") return "https://www.facebook.com/groups/autos.ar/posts/" + slug;
  if (fuente === "Reddit") return "https://www.reddit.com/r/argentina/comments/" + slug + "/post";
  if (fuente === "X") return "https://x.com/user/status/" + slug;
  if (fuente === "MercadoLibre") return "https://www.mercadolibre.com.ar/ml/item/MLA" + slug;
  return "#";
}

function buildReasoning(l) {
  const parts = [];
  parts.push("Lead detectado en <b>" + l.fuente + "</b> desde <b>" + l.ciudad + ", " + l.provincia + "</b>.");
  if (l.urgency) parts.push("Se detectaron marcadores de <b>urgencia</b> (palabras como 'URGENTE', 'YA', plazos explícitos).");
  if (l.signals.includes("transfer")) parts.push("Menciona explícitamente <b>transferencia</b> — intención comercial alta.");
  if (l.signals.includes("multa")) parts.push("Refiere <b>multas impagas</b> que bloquean el trámite.");
  if (l.signals.includes("preventive")) parts.push("Detectamos <b>preventivo/embargo</b> en el registro.");
  if (l.whatsapp) parts.push("Tiene <b>WhatsApp disponible</b> (" + l.whatsapp + ") — contacto directo posible.");
  else if (l.phone) parts.push("Tiene <b>teléfono</b> (" + l.phone + ") pero no WhatsApp explícito.");
  else parts.push("<b>Sin canal de contacto directo</b> — requiere búsqueda manual del perfil.");
  parts.push("Score final: <b>" + l.score + "/100</b> (" + scoreLabel(l.score) + ").");
  return parts.join(" ");
}
function scoreLabel(s) {
  if (s >= 90) return "Crítico";
  if (s >= 70) return "Alto";
  if (s >= 40) return "Medio";
  return "Bajo";
}

/* ============================================================
   FILTERING
   ============================================================ */
function applyFilters() {
  const now = Date.now();
  const ranges = {
    today: 12 * 3600 * 1000,
    "24h": 24 * 3600 * 1000,
    "3d": 3 * 24 * 3600 * 1000,
    week: 7 * 24 * 3600 * 1000,
    all: Infinity
  };
  const cutoff = now - ranges[STATE.range];

  const search = STATE.search.toLowerCase();
  const chips = STATE.chips;

  STATE.filtered = STATE.allLeads.filter(l => {
    if (new Date(l.fecha).getTime() < cutoff) return false;
    if (chips.has("hot") && l.score < 70) return false;
    if (chips.has("whatsapp") && !l.whatsapp) return false;
    if (chips.has("phone") && !l.phone) return false;
    if (chips.has("reddit") && l.fuente !== "Reddit") return false;
    if (chips.has("facebook") && l.fuente !== "Facebook") return false;
    if (chips.has("x") && l.fuente !== "X") return false;
    if (chips.has("ml") && l.fuente !== "MercadoLibre") return false;
    if (chips.has("recent") && (now - new Date(l.fecha).getTime()) > 24*3600*1000) return false;
    if (chips.has("unreviewed") && leadEstado(l) !== "new") return false;
    if (chips.has("contacted") && leadEstado(l) !== "contacted") return false;
    if (search) {
      const hay = (l.persona + " " + l.problema + " " + l.provincia + " " + l.ciudad + " " + l.vehiculo + " " + (l.patente||"") + " " + l.snippet).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  // sort
  const s = STATE.sort;
  STATE.filtered.sort((a,b) => {
    if (s === "score_desc") return b.score - a.score;
    if (s === "date_desc") return new Date(b.fecha) - new Date(a.fecha);
    if (s === "urgency_desc") return (b.urgency?1:0) - (a.urgency?1:0) || b.score - a.score;
    return 0;
  });

  $("empty-state").style.display = STATE.filtered.length === 0 ? "flex" : "none";
  // Reset scroll so user sees top of new filtered list
  $("table-body").scrollTop = 0;
  renderTable(true);
}

/* ============================================================

   ============================================================ */
function renderTableHeader() {
  const h = $("table-header");
  h.innerHTML = "";
  COLUMNS.forEach(c => {
    const th = el("div", "th " + c.cls, c.label);
    th.style.width = c.width + "px";
    th.style.flex = "0 0 " + c.width + "px";
    const r = el("div", "th-resizer");
    th.appendChild(r);
    h.appendChild(th);
    // resize
    let startX = 0, startW = 0;
    r.addEventListener("mousedown", e => {
      e.preventDefault();
      e.stopPropagation();
      startX = e.clientX;
      startW = c.width;
      const onMove = ev => {
        const nw = Math.max(50, startW + (ev.clientX - startX));
        c.width = nw;
        th.style.width = nw + "px";
        th.style.flex = "0 0 " + nw + "px";
        renderTable(true);
      };
      const onUp = () => {
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
      };
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });
}

function renderTable(reset) {
  const body = $("table-body");
  const spacer = $("table-spacer");
  const total = STATE.filtered.length;
  const totalH = total * STATE.rowH;
  spacer.style.height = totalH + "px";

  const scrollTop = body.scrollTop;
  const vpH = body.clientHeight;
  STATE.scrollTop = scrollTop;
  STATE.viewportH = vpH;

  const start = Math.max(0, Math.floor(scrollTop / STATE.rowH) - 5);
  const end = Math.min(total, Math.ceil((scrollTop + vpH) / STATE.rowH) + 5);
  const count = end - start;

  // Build HTML string for performance (virtual scroll: only render visible range + buffer)
  let out = "";
  for (let i = start; i < end; i++) {
    const l = STATE.filtered[i];
    if (!l) continue;
    const top = i * STATE.rowH;
    const sel = STATE.selectedId === l.id ? " selected" : "";
    out += `<div class="lead-row${sel}" style="top:${top}px" data-idx="${i}" data-id="${l.id}" onclick="openDrawer('${l.id}')">`;
    for (const c of COLUMNS) {
      // Strip the outer <div class="td..."> wrapper from cell output,
      // then re-wrap with the column class + width set inline.
      const inner = c.cell(l).replace(/^<div class="td[^"]*">/, "").replace(/<\/div>$/, "");
      out += `<div class="td ${c.cls}" style="width:${c.width}px;flex:0 0 ${c.width}px">${inner}</div>`;
    }
    out += `</div>`;
  }
  spacer.innerHTML = out;
}

function buildInsights(leads) {
  // detect patterns from data
  const hot = leads.filter(l => l.score >= 70);
  const total = leads.length;
  const fbHot = hot.filter(l => l.fuente === "Facebook").length;
  const baHot = hot.filter(l => (l.provincia === "Buenos Aires" || l.provincia === "CABA")).length;
  const transferHot = hot.filter(l => l.problema === "TRANSFER_PROBLEM").length;
  const waHot = hot.filter(l => l.whatsapp).length;

  const pctFb = pct(fbHot, hot.length);
  const pctBa = pct(baHot, hot.length);
  const pctTr = pct(transferHot, hot.length);
  const pctWa = pct(waHot, hot.length);

  return `El <b>${pctFb}</b> de los leads calientes provienen de <span class="tag">Facebook</span>,
  concentran <b>${pctBa}</b> en <span class="tag">Buenos Aires + CABA</span> y <b>${pctTr}</b> menciona
  <span class="tag">transferencia</span> como problema. <b>${pctWa}</b> tienen WhatsApp disponible —
  priorizar contacto directo en horario <b>10-12h</b>.`;
}

function sparklinePath(data, w, h, color) {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const step = w / (data.length - 1);
  const pts = data.map((d, i) => [i * step, h - ((d - min) / range) * (h - 4) - 2]);
  const path = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  return `<path d="${path}" fill="none" stroke="${color}" stroke-width="1.5"/>`;
}

function pct(a, b) {
  if (!b) return "0%";
  return Math.round((a / b) * 100) + "%";
}

/* ============================================================
   ANALYTICS
   ============================================================ */
function renderAnalytics() {
  const ar = $("analytics-row");
  const leads = STATE.allLeads;

  // Top problems
  const problems = countBy(leads, l => l.problema);
  // Top provinces
  const provinces = countBy(leads, l => l.provincia);
  // Top sources
  const sources = countBy(leads, l => l.fuente);
  // Hot hours
  const hours = new Array(24).fill(0);
  leads.forEach(l => { hours[new Date(l.fecha).getHours()]++; });
  // Trend last 7 days
  const trend = new Array(7).fill(0);
  const now = new Date();
  leads.forEach(l => {
    const d = new Date(l.fecha);
    const diff = Math.floor((now - d) / (24 * 3600 * 1000));
    if (diff >= 0 && diff < 7) trend[6 - diff]++;
  });

  ar.innerHTML = `
    <div class="chart-card">
      <div class="chart-title">Top problemas <span class="count">${leads.length}</span></div>
      <div class="chart-body">${renderBarChart(problems, {
        TRANSFER_PROBLEM: ["Transferencia", "#58a6ff"],
        FINE_DISPUTE: ["Multa", "#f85149"],
        OWNERSHIP_ISSUE: ["Titularidad", "#e8873b"],
        DOCUMENTATION_ISSUE: ["Documentación", "#2ea043"]
      })}</div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Top provincias <span class="count">${Object.keys(provinces).length}</span></div>
      <div class="chart-body">${renderBarChart(provinces, null, 5)}</div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Top fuentes <span class="count">${Object.keys(sources).length}</span></div>
      <div class="chart-body">${renderBarChart(sources, null, 4)}</div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Horas pico <span class="count">0-23h</span></div>
      <div class="chart-body" style="justify-content:flex-end">
        <div class="hour-chart">${hours.map((h,i) => `<div class="hour-bar ${h >= Math.max(...hours)*0.8 ? 'peak' : ''}" style="height:${(h/Math.max(...hours))*100}%" title="${i}h: ${h} leads"></div>`).join("")}</div>
        <div class="hour-labels"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>23h</span></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Tendencia 7 días <span class="count">${trend.reduce((a,b)=>a+b,0)}</span></div>
      <div class="chart-body"><div class="line-chart">${renderLineChart(trend)}</div></div>
    </div>
  `;
}

function countBy(arr, fn) {
  const m = {};
  arr.forEach(x => { const k = fn(x); m[k] = (m[k] || 0) + 1; });
  return m;
}

function renderBarChart(data, labelMap, topN) {
  let entries = Object.entries(data).sort((a,b) => b[1] - a[1]);
  if (topN) entries = entries.slice(0, topN);
  const max = Math.max(...entries.map(e => e[1]));
  const colors = ["#0176d3", "#58a6ff", "#2ea043", "#d29922", "#a371f7", "#e8873b"];
  return entries.map((e, i) => {
    const label = labelMap && labelMap[e[0]] ? labelMap[e[0]][0] : e[0];
    const color = labelMap && labelMap[e[0]] ? labelMap[e[0]][1] : colors[i % colors.length];
    return `<div class="bar-row">
      <div class="bar-row-label" title="${label}">${label}</div>
      <div class="bar-row-track"><div class="bar-row-fill" style="width:${(e[1]/max)*100}%;background:${color}"></div></div>
      <div class="bar-row-value">${e[1].toLocaleString("es-AR")}</div>
    </div>`;
  }).join("");
}

function renderLineChart(data) {
  const w = 200, h = 80;
  const max = Math.max(...data) || 1;
  const step = w / (data.length - 1);
  const pts = data.map((d, i) => [i * step, h - (d / max) * (h - 10) - 5]);
  const path = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const area = path + ` L${w} ${h} L0 ${h} Z`;
  const dots = pts.map(p => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="#0176d3"/>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:100%">
    <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0176d3" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0176d3" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#grad)"/>
    <path d="${path}" fill="none" stroke="#0176d3" stroke-width="2"/>
    ${dots}
  </svg>`;
}

/* ============================================================
   HEADER STATS
   ============================================================ */
function renderHeaderStats() {
  const m = DASHBOARD_PAYLOAD.metrics;
  $("hs-updated").textContent = fmtDateTime(DASHBOARD_PAYLOAD.generated_at);
  $("hs-runtime").textContent = DASHBOARD_PAYLOAD.runtime_ms + "ms";
  $("hs-total").textContent = m.total_leads.toLocaleString("es-AR");
  $("hs-hot").textContent = m.hot_leads.toLocaleString("es-AR");
  $("hs-contactable").textContent = m.contactable.toLocaleString("es-AR");
  $("hs-conv").textContent = pct(m.conversion_probability, 1);
}

/* ============================================================
   FILTERS UI
   ============================================================ */
function renderChips() {
  const chips = [
    ["hot", "Solo calientes"],
    ["whatsapp", "Solo WhatsApp"],
    ["phone", "Solo teléfono"],
    ["reddit", "Reddit"],
    ["facebook", "Facebook"],
    ["x", "X"],
    ["ml", "MercadoLibre"],
    ["recent", "Recientes 24h"],
    ["unreviewed", "No revisados"],
    ["contacted", "Contactados"]
  ];
  const c = $("chip-filters");
  c.innerHTML = chips.map(([id, label]) =>
    `<button class="chip" data-chip="${id}" onclick="toggleChip('${id}')"><span class="chip-dot"></span>${label}</button>`
  ).join("");
}

function toggleChip(id) {
  if (STATE.chips.has(id)) STATE.chips.delete(id);
  else STATE.chips.add(id);
  // update UI
  document.querySelectorAll(".chip").forEach(c => {
    c.classList.toggle("active", STATE.chips.has(c.dataset.chip));
  });
  applyFilters();
}

function setupFilters() {
  document.querySelectorAll("#time-filters button").forEach(b => {
    b.addEventListener("click", () => {
      document.querySelectorAll("#time-filters button").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      STATE.range = b.dataset.range;
      applyFilters();
    });
  });
  $("sort-select").addEventListener("change", e => {
    STATE.sort = e.target.value;
    applyFilters();
  });
  const searchInput = $("search-input");
  const debounced = debounce(() => {
    STATE.search = searchInput.value.trim();
    applyFilters();
  }, 100);
  searchInput.addEventListener("input", debounced);
}

/* ============================================================
   DRAWER
   ============================================================ */
function openDrawer(id) {
  const l = STATE.allLeads.find(x => x.id === id);
  if (!l) return;
  STATE.selectedId = id;
  renderDrawer(l);
  $("drawer").classList.add("open");
  $("drawer-overlay").classList.add("open");
  // Blur search so keyboard shortcuts work inside the drawer
  if (document.activeElement && document.activeElement.tagName === "INPUT") document.activeElement.blur();
  renderTable(false);
}

function closeDrawer() {
  $("drawer").classList.remove("open");
  $("drawer-overlay").classList.remove("open");
  STATE.selectedId = null;
  renderTable(false);
}

function renderDrawer(l) {
  // Lazy-generate reasoning if missing
  if (!l.reasoning) l.reasoning = buildReasoning(l);
  const header = $("drawer-header");
  const body = $("drawer-body");
  const actions = $("drawer-actions");
  const estado = leadEstado(l);
  const labels = { new:"nuevo", reviewed:"revisado", contacted:"contactado", ignored:"ignorado" };

  header.innerHTML = `
    <div class="drawer-header-info">
      <div class="drawer-score-row">
        <div class="drawer-score" style="color:${scoreColor(l.score)}">${l.score}</div>
        <div>
          <div class="drawer-prob"><b>${l.probability}%</b> probabilidad de conversión</div>
          <div class="drawer-title">${l.persona} · ${l.ciudad}, ${l.provincia}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;margin-top:6px">
        ${problemBadge(l.problema)}
        <span class="estado-chip estado-${estado}">${labels[estado]}</span>
        ${l.urgency ? '<span class="badge badge-fine">🔥 URGENTE</span>' : ''}
      </div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()" aria-label="Cerrar">✕</button>
  `;

  const hist = STATE.history[l.id] || [];

  body.innerHTML = `
    <div class="drawer-section">
      <div class="drawer-section-title">Desglose del score</div>
      ${(l.score_breakdown || []).map(b => `
        <div class="score-breakdown-row">
          <div class="score-breakdown-label" title="${b.signal}">${signalLabel(b.signal)} <span style="color:var(--text-faint);font-size:10px">(w${b.weight})</span></div>
          <div class="score-breakdown-track"><div class="score-breakdown-fill" style="width:${(b.value/b.weight)*100}%"></div></div>
          <div class="score-breakdown-value">${b.value}/${b.weight}</div>
        </div>
      `).join("")}
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">Señales detectadas</div>
      <div>${(l.signals || []).map(s => `<span class="signal-chip">${signalLabel(s)}</span>`).join("")}</div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">Razonamiento IA</div>
      <div class="reasoning-box">${l.reasoning}</div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">Evidencia (snippet original)</div>
      <div class="evidence-box">${escapeHtml(l.snippet)}</div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">Datos de contacto</div>
      <div class="contact-row">
        <span class="contact-label">Teléfono</span>
        <span class="contact-value">${l.phone || "—"} ${l.phone ? `<button class="copy-btn" onclick="copyText('${l.phone}', this)">copiar</button>` : ""}</span>
      </div>
      <div class="contact-row">
        <span class="contact-label">WhatsApp</span>
        <span class="contact-value">${l.whatsapp || "—"} ${l.whatsapp ? `<button class="copy-btn" onclick="copyText('${l.whatsapp}', this)">copiar</button>` : ""}</span>
      </div>
      <div class="contact-row">
        <span class="contact-label">Publicación</span>
        <span class="contact-value" style="font-size:11px"><a href="${l.source_url}" target="_blank" style="color:var(--accent);text-decoration:none">abrir ↗</a></span>
      </div>
      <div class="contact-row">
        <span class="contact-label">Vehículo</span>
        <span class="contact-value" style="font-size:11px">${l.vehiculo}${l.patente ? " · " + l.patente : ""}</span>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">Historial (${hist.length})</div>
      <div>${hist.length === 0 ? '<div style="font-size:11px;color:var(--text-faint)">Sin cambios registrados</div>' :
        hist.map(h => `<div class="timeline-item"><time>${fmtDateTime(h.ts)}</time> → ${labels[h.action] || h.action}</div>`).join("")}
        <div class="timeline-item"><time>${fmtDateTime(l.fecha)}</time> → lead detectado en ${l.fuente}</div>
      }</div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">Notas privadas</div>
      <textarea class="notes-area" id="notes-area" placeholder="Escribí notas internas sobre este lead…" oninput="saveNotes('${l.id}', this.value)">${leadNotes(l)}</textarea>
    </div>
  `;

  actions.innerHTML = `
    <button class="drawer-btn" onclick="markState('${l.id}','reviewed')"><span>✓</span> Revisado</button>
    <button class="drawer-btn primary" onclick="markState('${l.id}','contacted')"><span>📞</span> Contactado</button>
    <button class="drawer-btn danger" onclick="markState('${l.id}','ignored')"><span>✕</span> Ignorar</button>
    ${l.whatsapp ? `<a class="drawer-btn wa" href="https://wa.me/${l.whatsapp.replace(/[^0-9]/g,'')}" target="_blank"><span>💬</span> WhatsApp</a>` : '<button class="drawer-btn" disabled style="opacity:0.4;cursor:not-allowed">Sin WhatsApp</button>'}
    <button class="drawer-btn" onclick="window.open('${l.source_url}','_blank')"><span>↗</span> Publicación</button>
    <button class="drawer-btn" onclick="copyText('${l.phone || l.whatsapp || ""}', this)"><span>⎘</span> Copiar teléfono</button>
    <button class="drawer-btn" onclick="copyText('${l.source_url}', this)"><span>⎘</span> Copiar enlace</button>
    <button class="drawer-btn" onclick="exportSingleLead('${l.id}')"><span>⬇</span> Exportar lead</button>
  `;
}

function signalLabel(s) {
  const m = {
    explicit_intent: "Intención explícita",
    urgency: "Urgencia",
    jurisdiction_fit: "Jurisdicción",
    evidence_quality: "Calidad evidencia",
    commercial_potential: "Potencial comercial",
    channel_fit: "Canal",
    signal_repetition: "Repetición",
    has_phone: "Teléfono",
    has_whatsapp: "WhatsApp",
    recent: "Reciente",
    transfer: "Transferencia",
    multa: "Multa",
    preventive: "Preventivo",
    institutional: "Institucional"
  };
  return m[s] || s;
}

function escapeHtml(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function markState(id, action) {
  if (!STATE.history[id]) STATE.history[id] = [];
  STATE.history[id].push({ ts: new Date().toISOString(), action });
  persistState();
  // re-render
  if (STATE.selectedId === id) {
    const l = STATE.allLeads.find(x => x.id === id);
    if (l) renderDrawer(l);
  }
  renderTable(false);
  const labels = { reviewed:"revisado", contacted:"contactado", ignored:"ignorado" };
  toast(`Lead marcado como ${labels[action]}`, "success");
}

function saveNotes(id, txt) {
  setLeadNotes({ id: id }, txt);
}

function copyText(txt, btn) {
  if (!txt) { toast("Nada para copiar", "info"); return; }
  navigator.clipboard.writeText(txt).then(() => {
    if (btn) { btn.classList.add("copied"); btn.textContent = "✓"; setTimeout(() => { btn.classList.remove("copied"); btn.textContent = "copiar"; }, 1200); }
    toast("Copiado: " + (txt.length > 30 ? txt.slice(0,30) + "…" : txt), "success");
  }).catch(() => {
    // fallback
    const ta = document.createElement("textarea");
    ta.value = txt; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); toast("Copiado", "success"); } catch(e) { toast("No se pudo copiar", "info"); }
    ta.remove();
  });
}

/* ============================================================
   EXPORT
   ============================================================ */
function exportJSON() {
  const data = {
    exported_at: new Date().toISOString(),
    count: STATE.filtered.length,
    leads: STATE.filtered.map(l => ({ ...l, estado: leadEstado(l), notes: leadNotes(l), history: STATE.history[l.id] || [] }))
  };
  downloadFile(JSON.stringify(data, null, 2), "radar_leads.json", "application/json");
  toast(`${data.count} leads exportados a JSON`, "success");
}
function exportCSV() {
  const cols = ["id","score","probabilidad","persona","problema","provincia","ciudad","vehiculo","patente","urgency","fecha","fuente","phone","whatsapp","estado"];
  const rows = [cols.join(",")];
  STATE.filtered.forEach(l => {
    rows.push(cols.map(c => {
      let v = l[c];
      if (c === "estado") v = leadEstado(l);
      if (v == null) v = "";
      v = String(v).replace(/"/g, '""');
      if (v.includes(",") || v.includes('"') || v.includes("\n")) v = '"' + v + '"';
      return v;
    }).join(","));
  });
  downloadFile(rows.join("\n"), "radar_leads.csv", "text/csv");
  toast(`${STATE.filtered.length} leads exportados a CSV`, "success");
}
function exportSingleLead(id) {
  const l = STATE.allLeads.find(x => x.id === id);
  if (!l) return;
  const data = { ...l, estado: leadEstado(l), notes: leadNotes(l), history: STATE.history[l.id] || [] };
  downloadFile(JSON.stringify(data, null, 2), "lead_" + id + ".json", "application/json");
  toast("Lead exportado", "success");
}
function downloadFile(content, name, type) {
  const blob = new Blob([content], { type: type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
function setupKeyboard() {
  document.addEventListener("keydown", e => {
    // ignore when typing
    const tag = (e.target.tagName || "").toLowerCase();
    const inField = tag === "input" || tag === "textarea" || tag === "select";

    if (e.key === "/" && !inField) {
      e.preventDefault();
      $("search-input").focus();
      return;
    }
    if (e.key === "Escape") {
      if ($("drawer").classList.contains("open")) {
        closeDrawer();
      } else if (document.activeElement === $("search-input")) {
        $("search-input").blur();
      }
      return;
    }
    if (inField) return;

    // navigation
    if (!STATE.selectedId && (e.key === "j" || e.key === "k" || e.key === "Enter")) {
      if (STATE.filtered.length > 0) {
        STATE.selectedId = STATE.filtered[0].id;
        renderTable(false);
        if (e.key === "Enter") openDrawer(STATE.selectedId);
      }
      return;
    }
    if (e.key === "j" || e.key === "k") {
      const idx = STATE.filtered.findIndex(l => l.id === STATE.selectedId);
      let next = idx;
      if (e.key === "j") next = Math.min(STATE.filtered.length - 1, idx + 1);
      if (e.key === "k") next = Math.max(0, idx - 1);
      if (next !== idx && STATE.filtered[next]) {
        STATE.selectedId = STATE.filtered[next].id;
        renderTable(false);
        // scroll into view
        const body = $("table-body");
        const top = next * STATE.rowH;
        if (top < body.scrollTop) body.scrollTop = top;
        if (top + STATE.rowH > body.scrollTop + body.clientHeight) body.scrollTop = top + STATE.rowH - body.clientHeight;
      }
      return;
    }
    if (e.key === "Enter" && STATE.selectedId) {
      openDrawer(STATE.selectedId);
      return;
    }
    if (e.key === "r" && STATE.selectedId) { markState(STATE.selectedId, "reviewed"); return; }
    if (e.key === "c" && STATE.selectedId) { markState(STATE.selectedId, "contacted"); return; }
    if (e.key === "i" && STATE.selectedId) { markState(STATE.selectedId, "ignored"); return; }
    if (e.key === "e") { e.preventDefault(); exportJSON(); return; }
  });
}

/* ============================================================
   SCROLL HANDLER (rAF-throttled)
   ============================================================ */
let scrollRaf = null;
function setupScroll() {
  const body = $("table-body");
  body.addEventListener("scroll", () => {
    if (scrollRaf) return;
    scrollRaf = requestAnimationFrame(() => {
      scrollRaf = null;
      renderTable(false);
    });
  }, { passive: true });
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  loadPersisted();
  // Light setup first (no heavy data work) so DOMContentLoaded fires fast
  renderChips();
  renderTableHeader();
  setupFilters();
  setupKeyboard();
  setupScroll();
  // Defer heavy data expansion + filtering to next tick
  setTimeout(() => {
    STATE.allLeads = expandLeads();
    renderHeaderStats();
    renderCommandCenter();
    renderAnalytics();
    applyFilters();
    const ro = new ResizeObserver(() => renderTable(false));
    ro.observe($("table-body"));
  }, 0);
  // remove shimmer after brief moment
  setTimeout(() => {
    const s = $("shimmer");
    if (s) s.remove();
  }, 600);

  // resize observer for table re-render
  const ro = new ResizeObserver(() => renderTable(false));
  ro.observe($("table-body"));
}

// boot
document.addEventListener("DOMContentLoaded", init);
</script>
